<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ingest · peripheral service</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- ========== main : ingest dashboard ========== -->
      <main class="main">
        <header class="bar">
          <div class="bar__id">
            <svg class="glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3 L20 8 V16 L12 21 L4 16 V8 Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              />
              <circle cx="12" cy="12" r="2.4" fill="currentColor" />
            </svg>
            <span class="bar__name">ingest</span>
            <span class="bar__sub">peripheral service</span>
          </div>
          <div class="bar__status">
            <span class="dot"></span>
            <span>3 host systems connected</span>
          </div>
        </header>

        <!-- drop dock -->
        <section class="drop" id="drop">
          <div class="drop__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 15V4m0 0L8 8m4-4 4 4M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div class="drop__text">
            <p class="drop__lead">Drop files or point a folder at this dock</p>
            <p class="drop__types">txt, json, pdf, xlsx, image</p>
          </div>
          <div class="drop__accepts" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M6 2h12v20H6z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <path
                d="M9 8h6M9 12h6M9 16h4"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
            <svg viewBox="0 0 24 24">
              <path
                d="M9 5c-2 0-3 1-3 3v1c0 1-1 2-2 2 1 0 2 1 2 2v1c0 2 1 3 3 3M15 5c2 0 3 1 3 3v1c0 1 1 2 2 2-1 0-2 1-2 2v1c0 2-1 3-3 3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
            <svg viewBox="0 0 24 24">
              <path
                d="M6 2h8l4 4v16H6z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <path
                d="M14 2v4h4"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
            <svg viewBox="0 0 24 24">
              <rect
                x="4"
                y="4"
                width="16"
                height="16"
                rx="1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <path
                d="M4 10h16M10 4v16"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
            <svg viewBox="0 0 24 24">
              <rect
                x="4"
                y="4"
                width="16"
                height="16"
                rx="1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <circle cx="9" cy="9" r="1.6" fill="currentColor" />
              <path
                d="M5 17l4-4 3 3 3-4 4 5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
          </div>
        </section>

        <!-- pipeline -->
        <section class="stage">
          <p class="label">pipeline</p>
          <div class="pipe">
            <div class="pipe__step">
              <div class="node">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M7 3h10v18H7z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <path
                    d="M10 8h4M10 12h4M10 16h2"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                </svg>
              </div>
              <span class="node__num">0</span>
              <span class="node__label">parsed</span>
            </div>
            <div class="pipe__step">
              <div class="node">
                <svg viewBox="0 0 24 24">
                  <circle
                    cx="7"
                    cy="7"
                    r="2.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <circle
                    cx="7"
                    cy="17"
                    r="2.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <path
                    d="M9 8.5 19 15M9 15.5 19 9"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                </svg>
              </div>
              <span class="node__num">0</span>
              <span class="node__label">chunked</span>
            </div>
            <div class="pipe__step">
              <div class="node node--active">
                <svg viewBox="0 0 24 24">
                  <rect
                    x="7"
                    y="7"
                    width="10"
                    height="10"
                    rx="1"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <path
                    d="M10 3v4M14 3v4M10 17v4M14 17v4M3 10h4M3 14h4M17 10h4M17 14h4"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                </svg>
              </div>
              <span class="node__num">0</span>
              <span class="node__label">embedding</span>
            </div>
            <div class="pipe__step">
              <div class="node node--done"></div>
              <span class="node__num">0</span>
              <span class="node__label">indexed</span>
            </div>
          </div>
        </section>

        <!-- recent documents -->
        <section class="stage">
          <p class="label">recent documents</p>
          <div class="table" id="docTable">
            <div class="row row--head">
              <span></span><span>name</span><span>chunks</span><span>size</span
              ><span>status</span>
            </div>
            <!-- rows injected by app.js -->
          </div>
        </section>
      </main>

      <!-- ========== aside : chatbot ========== -->
      <aside class="chat">
        <div class="chat__head">
          <span class="chat__name">query</span>
          <span class="chat__meta">226 indexed</span>
        </div>
        <div class="chat__stream" id="stream">
          <p class="chat__empty">Ask anything about your indexed documents.</p>
        </div>
        <div class="chat__dock">
          <textarea
            id="input"
            rows="1"
            placeholder="ask your corpus…"
            spellcheck="false"
          ></textarea>
          <button id="send" aria-label="send" disabled>
            <svg viewBox="0 0 24 24">
              <path
                d="M4 12h14M13 7l5 5-5 5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </aside>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
